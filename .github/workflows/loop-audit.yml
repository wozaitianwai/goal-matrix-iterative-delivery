name: Loop Readiness Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: loop-verify (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Shared loop verifier
        env:
          GOAL_MATRIX_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GOAL_MATRIX_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python3 scripts/loop_verify.py --require-level L3
